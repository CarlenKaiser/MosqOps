name: Release Carrier Image

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-carrier-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image coordinates
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          REF_NAME: ${{ github.ref_name }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER_LC}/mosqops-plugin"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_TAG="${MANUAL_TAG}"
          elif [[ "${EVENT_NAME}" == "release" && -n "${RELEASE_TAG}" ]]; then
            VERSION_TAG="${RELEASE_TAG}"
          elif [[ -n "${REF_NAME}" ]]; then
            VERSION_TAG="${REF_NAME}"
          else
            VERSION_TAG="latest"
          fi

          VERSION_STRIPPED="${VERSION_TAG#v}"
          PUBLISH_LATEST="false"

          # Mark stable semver releases/tags as latest (vX.Y.Z or X.Y.Z).
          if [[ "${VERSION_TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PUBLISH_LATEST="true"
          fi

          # Never mark GitHub prereleases as latest.
          if [[ "${EVENT_NAME}" == "release" && "${RELEASE_PRERELEASE}" == "true" ]]; then
            PUBLISH_LATEST="false"
          fi

          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_stripped=${VERSION_STRIPPED}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${PUBLISH_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version_tag }}
            type=raw,value=${{ steps.vars.outputs.version_stripped }}
            ${{ steps.vars.outputs.publish_latest == 'true' && 'type=raw,value=latest' || '' }}
          labels: |
            org.opencontainers.image.title=MosqOps Plugin Carrier
            org.opencontainers.image.description=Multi-arch carrier image for MosqOps plugin artifact
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-arch carrier image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.carrier
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
