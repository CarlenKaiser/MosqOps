name: Bug report
description: Report a reproducible defect in MosqOps
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Start broker with ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions and runtime details.
      placeholder: |
        - MosqOps commit/tag:
        - Mosquitto version:
        - OS/Container:
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs, redacting secrets.
